intent_service_url: "http://127.0.0.1:8808"
business_callback_url: "http://127.0.0.1:9000/callback"
interrupt_url: "http://127.0.0.1:9000/interrupt"
transcript_url: "http://127.0.0.1:9000/transcript"

# VAD 打断：检测到连续说话超过此时长触发无意图打断
vad_interrupt_threshold_ms: 2000
# 打断功能开关
interrupt_enabled: true

# 停顿最大时长：静音超过此时长判定一句话结束，触发 Intent 调用
silence_max_ms: 600

# 客户无应答时长：连接后超过此时长未收到有效文本，推送无应答指令
no_answer_timeout_ms: 10000

# 客户匹配时长：有文本输入但未命中意图，超过此时长流转兜底
match_timeout_ms: 15000

log_path: "./log"
log_level: "INFO"

# FunASR 模型配置（路径通过此处配置，支持 Nacos 热更新）
asr_model_path: "D:/model/iic/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-online"
vad_model_path: "D:/model/iic/speech_fsmn_vad_zh-cn-16k-common-pytorch"
enhancer_model_path: "D:/model/iic/speech_zipenhancer_ans_multiloss_16k_base"
offline_asr_model_path: "D:/model/iic/funasr_finetune_offline"
asr_device: "cpu"
# 流式推理分块参数：[lookback, current, lookahead]（单位：LFR 帧，1帧≈60ms）
# current=2 → chunk_stride=120ms，首词延迟从 ~480ms 降至 ~240ms；look_back 增大补偿精度
asr_chunk_size: [0, 2, 1]
asr_encoder_chunk_look_back: 4
asr_decoder_chunk_look_back: 1
intent_epoch_guard_enabled: true
asr_workers: 8
vad_workers: 4
enhancer_workers: 2
vad_energy_threshold: 500

# VAD 门控 ASR：VAD 判为非语音的帧不送入 ASR，从根本上拦截噪音识别（true=开启）
vad_gate_asr: false